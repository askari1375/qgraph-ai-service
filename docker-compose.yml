services:
  ai-backend:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "uvicorn",
        "src.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--reload",
        "--reload-dir",
        "/app/src",
      ]
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - .:/app
    environment:
      PYTHONUNBUFFERED: "1"
      # Dev OpenSearch matches production: security plugin on (https + basic auth).
      # The self-signed dev cert is not verified for this local hop.
      QGRAPH_AI_OPENSEARCH_URL: "https://opensearch:9200"
      QGRAPH_AI_OPENSEARCH_USERNAME: "admin"
      QGRAPH_AI_OPENSEARCH_PASSWORD: "${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-DevAdmin123!}"
      QGRAPH_AI_OPENSEARCH_VERIFY_CERTS: "false"
      # Local Qdrant (started under the `search` profile); internal-only, no auth in dev.
      QGRAPH_AI_QDRANT_URL: "http://qdrant:6333"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  opensearch:
    # Mirrors production: security plugin enabled (TLS + auth), 2.12+ image with
    # the admin user bootstrapped from a password. Dev default is non-secret.
    image: ${QGRAPH_OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.17.1}
    profiles:
      - search
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-DevAdmin123!}"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -ksS -u \"admin:$$OPENSEARCH_INITIAL_ADMIN_PASSWORD\" https://127.0.0.1:9200 >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  qdrant:
    # Semantic-retrieval vector store. Local-dev only; production Qdrant is owned by qgraph-deploy.
    image: ${QGRAPH_QDRANT_IMAGE:-qdrant/qdrant:v1.12.4}
    profiles:
      - search
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  opensearch-data:
  qdrant-data:
