services:
  ai-backend:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "uvicorn",
        "src.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--reload",
        "--reload-dir",
        "/app/src",
      ]
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - .:/app
    environment:
      PYTHONUNBUFFERED: "1"
      QGRAPH_AI_OPENSEARCH_URL: "http://opensearch:9200"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  opensearch:
    image: ${QGRAPH_OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.11.1}
    profiles:
      - search
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  opensearch-data:
