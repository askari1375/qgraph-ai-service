name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.15"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Build Docker image
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build --tag qgraph-ai-service:ci .

  # Build the production image and push it to GHCR so the VPS pulls a prebuilt
  # artifact instead of building on the host. Runs only after checks pass, and
  # only on pushes to main. The Deploy workflow chains off this CI workflow
  # completing, so by the time it runs the image already exists.
  image:
    name: Build and push image
    needs: [checks]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Compute image metadata
        id: meta
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "sha7=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/qgraph-ai-service:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/qgraph-ai-service:sha-${{ steps.meta.outputs.sha7 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
